<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Incentive Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: #1a1a1a; background: #f5f5f5; padding: 1rem; }
.container { max-width: 860px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 1.5rem; }
h1 { font-size: 18px; font-weight: 600; margin-bottom: 1.5rem; color: #111; }
.tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 1px solid #e0e0e0; }
.tab-btn { padding: 8px 22px; font-size: 14px; font-weight: 500; background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; color: #888; margin-bottom: -1px; transition: color 0.15s; }
.tab-btn.active { color: #111; border-bottom: 2px solid #111; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.sec-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin: 1.25rem 0 0.6rem; }
table { width: 100%; border-collapse: collapse; table-layout: fixed; }
th { font-size: 11px; color: #888; font-weight: 500; padding: 4px 6px; text-align: right; border-bottom: 1px solid #e8e8e8; }
th:first-child { text-align: left; }
td { padding: 7px 6px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; font-size: 13px; text-align: right; }
td:first-child { text-align: left; }
.sub-row td { background: #fafafa; }
.sub-row td:first-child { padding-left: 18px; }
.sub-name { font-size: 12px; color: #666; }
.combined-row td { background: #f2f2f2; border-bottom: 1px solid #ddd; }
.combined-row td:first-child { padding-left: 18px; }
.tbl-total td { font-weight: 600; background: #f5f5f5; border-top: 1px solid #ddd; border-bottom: none; }
.tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 20px; margin-left: 4px; }
.tag-b { background: #E6F1FB; color: #0C447C; }
.tag-p { background: #EEEDFE; color: #3C3489; }
input[type=number] { width: 100%; font-size: 13px; border: 1px solid #ddd; border-radius: 6px; padding: 5px 6px; text-align: right; outline: none; background: #fff; }
input[type=number]:focus { border-color: #666; }
.ach-val { font-size: 13px; font-weight: 600; }
.bar-wrap { background: #e8e8e8; border-radius: 4px; height: 4px; margin-top: 3px; overflow: hidden; }
.bar-fill { height: 4px; border-radius: 4px; transition: width 0.3s; }
.payout-val { font-size: 13px; font-weight: 600; }
.payout-sub { font-size: 10px; color: #888; margin-top: 1px; }
.alert { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin: 0.75rem 0; }
.alert-ok { background: #EAF3DE; color: #27500A; }
.alert-warn { background: #FAEEDA; color: #633806; }
.alert-info { background: #E6F1FB; color: #0C447C; }
.rollback-box { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 14px 16px; margin: 0.75rem 0; }
.rb-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
.rb-row.total { font-weight: 600; border-top: 1px solid #e0e0e0; margin-top: 4px; padding-top: 8px; }
.note { font-size: 11px; color: #888; margin-top: 8px; }
.locked { opacity: 0.4; }
</style>
</head>
<body>
<div class="container">
  <h1>Sales Incentive Calculator</h1>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('q1')">Q1</button>
    <button class="tab-btn" onclick="switchTab('q2')">Q2</button>
    <button class="tab-btn" onclick="switchTab('h1')">H1 Summary</button>
  </div>
  <div id="tab-q1" class="tab-panel active"></div>
  <div id="tab-q2" class="tab-panel"></div>
  <div id="tab-h1" class="tab-panel"></div>
</div>

<script>
const GROUPS = [
  { id:'g1', name:'Cort / Firm / Pico', weight:0.20, tag:'20%', tc:'tag-b',
    subs:[{id:'cort',name:'Cort'},{id:'firm',name:'Firm'},{id:'pico',name:'Pico'}] },
  { id:'g2', name:'Gly / Min', weight:0.20, tag:'20%', tc:'tag-b',
    subs:[{id:'gly',name:'Gly'},{id:'min',name:'Min'}] },
  { id:'g3', name:'Pentasa',  weight:0.30, tag:'30%', tc:'tag-p', subs:null },
  { id:'g4', name:'Nocdurna', weight:0.30, tag:'30%', tc:'tag-p', subs:null },
];
const MAX = 6250, THR = 0.90;
const state = { q1:null, q2:null };

// Payout % — capped at 100% for incentive, but achievement % is uncapped
function payPct(ach) {
  if (ach < THR) return 0;
  return Math.min(0.50 + Math.floor((ach - THR) / 0.01) * 0.05, 1.00);
}
function rm(n) { return 'RM ' + n.toFixed(2); }
function fp(n) { return (n * 100).toFixed(2) + '%'; }

function getVals(q, g) {
  if (g.subs) {
    let t=0, a=0;
    g.subs.forEach(s => {
      t += parseFloat(document.getElementById(q+'_t_'+g.id+'_'+s.id).value)||0;
      a += parseFloat(document.getElementById(q+'_a_'+g.id+'_'+s.id).value)||0;
    });
    return {tgt:t, act:a};
  }
  return {
    tgt: parseFloat(document.getElementById(q+'_t_'+g.id).value)||0,
    act: parseFloat(document.getElementById(q+'_a_'+g.id).value)||0
  };
}

function buildPanel(q) {
  let rows = '';
  GROUPS.forEach(g => {
    const pm = MAX * g.weight;
    if (g.subs) {
      g.subs.forEach(s => {
        rows += `<tr class="sub-row">
          <td><div class="sub-name">${s.name}</div></td>
          <td><input type="number" id="${q}_t_${g.id}_${s.id}" placeholder="0.00" min="0" step="0.01" oninput="calc('${q}')"></td>
          <td><input type="number" id="${q}_a_${g.id}_${s.id}" placeholder="0.00" min="0" step="0.01" oninput="calc('${q}')"></td>
          <td></td><td></td>
        </tr>`;
      });
      rows += `<tr class="combined-row">
        <td>
          <strong>${g.name}</strong><span class="tag ${g.tc}">${g.tag}</span>
          <span style="font-size:10px;"> combined</span><br>
          <span style="font-size:10px;color:#888;">Max: ${rm(pm)}</span>
        </td>
        <td id="${q}_ct_${g.id}">—</td>
        <td id="${q}_ca_${g.id}">—</td>
        <td>
          <div class="ach-val" id="${q}_ach_${g.id}" style="color:#888;">—</div>
          <div class="bar-wrap"><div class="bar-fill" id="${q}_bar_${g.id}" style="width:0%;background:#ccc;"></div></div>
        </td>
        <td id="${q}_pc_${g.id}">
          <div class="payout-val" id="${q}_pay_${g.id}">—</div>
          <div class="payout-sub" id="${q}_sub_${g.id}"></div>
        </td>
      </tr>`;
    } else {
      rows += `<tr>
        <td>
          <div style="font-weight:600;">${g.name}<span class="tag ${g.tc}">${g.tag}</span></div>
          <div style="font-size:11px;color:#888;">Max: ${rm(pm)}</div>
        </td>
        <td><input type="number" id="${q}_t_${g.id}" placeholder="0.00" min="0" step="0.01" oninput="calc('${q}')"></td>
        <td><input type="number" id="${q}_a_${g.id}" placeholder="0.00" min="0" step="0.01" oninput="calc('${q}')"></td>
        <td>
          <div class="ach-val" id="${q}_ach_${g.id}" style="color:#888;">—</div>
          <div class="bar-wrap"><div class="bar-fill" id="${q}_bar_${g.id}" style="width:0%;background:#ccc;"></div></div>
        </td>
        <td id="${q}_pc_${g.id}">
          <div class="payout-val" id="${q}_pay_${g.id}">—</div>
          <div class="payout-sub" id="${q}_sub_${g.id}"></div>
        </td>
      </tr>`;
    }
  });

  return `<div class="sec-label">Product targets &amp; actuals</div>
  <table>
    <colgroup>
      <col style="width:27%"><col style="width:16%"><col style="width:16%"><col style="width:18%"><col style="width:23%">
    </colgroup>
    <thead><tr>
      <th>Product</th><th>Target (RM)</th><th>Actual (RM)</th><th>Achieve %</th><th>Payout (RM)</th>
    </tr></thead>
    <tbody>${rows}</tbody>
    <tfoot>
      <tr class="tbl-total">
        <td>Overall weighted</td><td></td><td></td>
        <td id="${q}_tach">—</td>
        <td id="${q}_tpay">—</td>
      </tr>
    </tfoot>
  </table>
  <div id="${q}_alert"></div>
  <p class="note" id="${q}_note" style="display:none;">Enter both Q1 and Q2, then check the H1 tab for rollback calculation.</p>`;
}

function calc(q) {
  let wtd = 0, filled = true;
  const details = GROUPS.map(g => {
    const {tgt, act} = getVals(q, g);
    if (!tgt) filled = false;
    // Achievement % is UNCAPPED — shows real % even above 100%
    const ach = tgt > 0 ? act / tgt : 0;
    wtd += ach * g.weight;

    if (g.subs) {
      const ct = document.getElementById(q+'_ct_'+g.id);
      const ca = document.getElementById(q+'_ca_'+g.id);
      if (ct) ct.textContent = tgt > 0 ? rm(tgt) : '—';
      if (ca) ca.textContent = act > 0 ? rm(act) : '—';
    }

    const ae = document.getElementById(q+'_ach_'+g.id);
    const be = document.getElementById(q+'_bar_'+g.id);
    if (tgt > 0) {
      ae.textContent = fp(ach);
      ae.style.color = ach >= 0.9 ? '#27500A' : '#c45a00';
      be.style.width = Math.min(ach*100, 100).toFixed(1) + '%';
      be.style.background = ach >= 0.9 ? '#639922' : '#e07800';
    } else {
      ae.textContent = '—'; ae.style.color = '#888'; be.style.width = '0%';
    }
    return {...g, tgt, act, ach};
  });

  const eligible = filled && wtd >= THR;
  let total = 0;

  details.forEach(g => {
    const pm = MAX * g.weight;
    const pe = document.getElementById(q+'_pay_'+g.id);
    const se = document.getElementById(q+'_sub_'+g.id);
    const ce = document.getElementById(q+'_pc_'+g.id);

    if (!filled) {
      pe.textContent = '—'; pe.style.color = '#888'; se.textContent = ''; ce.classList.remove('locked');
    } else if (!eligible) {
      pe.textContent = 'RM 0.00'; pe.style.color = '#c0392b';
      se.textContent = 'Overall <90% — locked'; ce.classList.add('locked');
    } else {
      // Payout % capped at 100% even if achievement >100%
      const pp = payPct(g.ach);
      const earned = pp * pm;
      total += earned;
      ce.classList.remove('locked');
      if (pp > 0) {
        pe.textContent = rm(earned); pe.style.color = '#111';
        se.textContent = fp(g.ach) + ' hit → ' + fp(pp) + ' of ' + rm(pm);
      } else {
        pe.textContent = 'RM 0.00'; pe.style.color = '#c0392b';
        se.textContent = 'Product <90% — no payout';
      }
    }
  });

  document.getElementById(q+'_tach').textContent = filled ? fp(wtd) : '—';
  document.getElementById(q+'_tpay').textContent = !filled ? '—' : eligible ? rm(total) : 'RM 0.00';

  const al = document.getElementById(q+'_alert');
  if (!filled) {
    al.innerHTML = '';
  } else if (!eligible) {
    al.innerHTML = `<div class="alert alert-warn">&#9888; Overall weighted achievement ${fp(wtd)} — below 90% threshold. All product payouts are locked.</div>`;
  } else {
    al.innerHTML = `<div class="alert alert-ok">&#10003; Overall ${fp(wtd)} — eligible! Payout capped at 100% per product. Total incentive: ${rm(total)}</div>`;
  }

  document.getElementById(q+'_note').style.display = filled ? 'block' : 'none';
  state[q] = filled ? {wtd, eligible, earned:total, details} : null;

  // Auto-refresh H1 whenever both quarters have data
  if (state.q1 && state.q2) renderH1();
}

function buildH1Panel() {
  return `<div id="h1-content"><div class="alert alert-info" style="margin-top:0.5rem;">&#8505; Fill in Q1 and Q2 — H1 summary will update automatically.</div></div>`;
}

function renderH1() {
  if (!state.q1 || !state.q2) return;
  const q1 = state.q1, q2 = state.q2;
  let h1w = 0;
  const h1d = GROUPS.map((g, i) => {
    const tgt = q1.details[i].tgt + q2.details[i].tgt;
    const act = q1.details[i].act + q2.details[i].act;
    const ach = tgt > 0 ? act / tgt : 0; // uncapped
    h1w += ach * g.weight;
    return {...g, tgt, act, ach};
  });

  const elig = h1w >= THR;
  let h1tot = 0;
  let prows = '';

  h1d.forEach(g => {
    const pm = MAX * 2 * g.weight;
    const pp = elig ? payPct(g.ach) : 0; // payout capped at 100%
    const pe = pp * pm;
    h1tot += pe;
    const bw = Math.min(g.ach*100, 100).toFixed(1);
    const bc = g.ach >= 0.9 ? '#639922' : '#e07800';
    const ac = g.ach >= 0.9 ? '#27500A' : '#c45a00';
    const pc = pp > 0 ? '#111' : '#c0392b';
    const ps = !elig ? 'Overall <90% — locked'
      : pp > 0 ? fp(g.ach) + ' hit → ' + fp(pp) + ' of ' + rm(pm)
      : 'Product <90% — no payout';
    const nn = g.subs ? ` <span style="font-size:10px;font-style:italic;">(combined)</span>` : '';
    prows += `<tr>
      <td>
        <div style="font-weight:600;">${g.name}${nn}<span class="tag ${g.tc}">${g.tag}</span></div>
        <div style="font-size:11px;color:#888;">H1 max: ${rm(pm)}</div>
      </td>
      <td>${rm(g.tgt)}</td><td>${rm(g.act)}</td>
      <td>
        <div class="ach-val" style="color:${ac};">${fp(g.ach)}</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${bw}%;background:${bc};"></div></div>
      </td>
      <td>
        <div class="payout-val" style="color:${pc};">${elig && pp>0 ? rm(pe) : 'RM 0.00'}</div>
        <div class="payout-sub">${ps}</div>
      </td>
    </tr>`;
  });

  const paid = q1.earned + q2.earned;
  // Total H1 payout capped at RM 12,500 (100% × 2 quarters)
  const cap = Math.min(h1tot, MAX * 2);
  const rb = Math.max(0, cap - paid);
  const net = paid + rb;

  const ah = !elig
    ? `<div class="alert alert-warn">&#9888; H1 overall ${fp(h1w)} — below 90%. No rollback payable.</div>`
    : rb > 0
      ? `<div class="alert alert-ok">&#10003; H1 eligible! Rollback of ${rm(rb)} payable to recover Q1 shortfall.</div>`
      : `<div class="alert alert-ok">&#10003; H1 eligible. No additional rollback — quarterly payments already covered full entitlement.</div>`;

  document.getElementById('h1-content').innerHTML = `
    <div class="sec-label">H1 combined performance</div>
    <table>
      <colgroup><col style="width:27%"><col style="width:16%"><col style="width:16%"><col style="width:18%"><col style="width:23%"></colgroup>
      <thead><tr><th>Product</th><th>H1 target (RM)</th><th>H1 actual (RM)</th><th>Achieve %</th><th>H1 payout (RM)</th></tr></thead>
      <tbody>${prows}</tbody>
      <tfoot><tr class="tbl-total"><td>Overall weighted</td><td></td><td></td><td>${fp(h1w)}</td><td>${rm(cap)}</td></tr></tfoot>
    </table>
    ${ah}
    <div class="sec-label">Rollback reconciliation</div>
    <div class="rollback-box">
      <div class="rb-row"><span>Q1 incentive paid</span><span>${rm(q1.earned)}</span></div>
      <div class="rb-row"><span>Q2 incentive paid</span><span>${rm(q2.earned)}</span></div>
      <div class="rb-row"><span>Total paid to date</span><span>${rm(paid)}</span></div>
      <div class="rb-row"><span>H1 total entitlement (capped 100%×2)</span><span>${rm(cap)}</span></div>
      <div class="rb-row total"><span>Rollback payable now</span><span style="color:${rb>0?'#27500A':'#111'};">${rm(rb)}</span></div>
      <div class="rb-row total"><span>Net total for H1</span><span>${rm(net)}</span></div>
    </div>`;
}

function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['q1','q2','h1'][i]===t));
  document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', ['q1','q2','h1'][i]===t));
  if (t === 'h1' && state.q1 && state.q2) renderH1();
}

document.getElementById('tab-q1').innerHTML = buildPanel('q1');
document.getElementById('tab-q2').innerHTML = buildPanel('q2');
document.getElementById('tab-h1').innerHTML = buildH1Panel();
</script>
</body>
</html>
