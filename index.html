<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Incentive Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f5;padding:1rem;}
.wrap{max-width:900px;margin:0 auto;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:1.5rem;}
.login-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:2rem;max-width:360px;margin:2rem auto;}
.login-title{font-size:16px;font-weight:600;margin-bottom:0.25rem;}
.login-sub{font-size:13px;color:#666;margin-bottom:1.5rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:12px;color:#666;margin-bottom:4px;}
.field input{width:100%;font-size:14px;border:1px solid #ddd;border-radius:6px;padding:8px 10px;outline:none;}
.field input:focus{border-color:#555;}
.btn-row{display:flex;gap:8px;margin-top:1.25rem;}
.bp{flex:1;padding:9px;font-size:14px;font-weight:500;cursor:pointer;border-radius:8px;background:#111;border:none;color:#fff;}
.bp:hover{background:#333;}
.bs{flex:1;padding:9px;font-size:14px;font-weight:500;cursor:pointer;border-radius:8px;background:transparent;border:1px solid #ddd;color:#111;}
.bs:hover{background:#f5f5f5;}
.err{font-size:12px;color:#c0392b;margin-top:8px;min-height:16px;}
.ok{font-size:12px;color:#27500A;margin-top:8px;min-height:16px;}
.app-wrap{display:none;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.user-chip{display:flex;align-items:center;gap:6px;font-size:13px;color:#666;}
.logout-btn{font-size:12px;cursor:pointer;color:#666;background:transparent;border:1px solid #ddd;border-radius:6px;padding:4px 10px;}
.logout-btn:hover{background:#f5f5f5;}
.save-badge{font-size:11px;color:#27500A;display:none;}
.tabs{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:1.5rem;border-bottom:1px solid #e0e0e0;}
.tab-btn{padding:6px 16px;font-size:13px;font-weight:500;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;color:#888;margin-bottom:-1px;white-space:nowrap;}
.tab-btn.active{color:#111;border-bottom:2px solid #111;}
.tab-btn.hy{color:#185FA5;}
.tab-btn.hy.active{color:#185FA5;border-bottom-color:#185FA5;}
.tab-btn.yr{color:#3B6D11;}
.tab-btn.yr.active{color:#3B6D11;border-bottom-color:#3B6D11;}
.tab-sep{width:1px;background:#e0e0e0;margin:0 4px 1px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.sec-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin:1.25rem 0 0.6rem;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
th{font-size:11px;color:#888;font-weight:500;padding:4px 6px;text-align:right;border-bottom:1px solid #e8e8e8;}
th:first-child{text-align:left;}
td{padding:7px 6px;border-bottom:1px solid #f0f0f0;vertical-align:middle;font-size:13px;text-align:right;}
td:first-child{text-align:left;}
.sub-row td{background:#fafafa;}
.sub-row td:first-child{padding-left:18px;}
.sub-name{font-size:12px;color:#666;}
.comb-row td{background:#f2f2f2;border-bottom:1px solid #ddd;}
.comb-row td:first-child{padding-left:18px;}
.tbl-total td{font-weight:600;background:#f5f5f5;border-top:1px solid #ddd;border-bottom:none;}
.tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:20px;margin-left:4px;}
.tag-b{background:#E6F1FB;color:#0C447C;}
.tag-p{background:#EEEDFE;color:#3C3489;}
input[type=number]{width:100%;font-size:13px;border:1px solid #ddd;border-radius:6px;padding:5px 6px;text-align:right;outline:none;background:#fff;}
input[type=number]:focus{border-color:#666;}
.ach-val{font-size:13px;font-weight:600;}
.bar-wrap{background:#e8e8e8;border-radius:4px;height:4px;margin-top:3px;overflow:hidden;}
.bar-fill{height:4px;border-radius:4px;transition:width 0.25s;}
.pay-val{font-size:13px;font-weight:600;}
.pay-sub{font-size:10px;color:#888;margin-top:1px;}
.locked{opacity:0.4;}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin:0.75rem 0;}
.a-ok{background:#EAF3DE;color:#27500A;}
.a-warn{background:#FAEEDA;color:#633806;}
.a-info{background:#E6F1FB;color:#0C447C;}
.rb-box{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px 16px;margin:0.75rem 0;}
.rb-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;}
.rb-total{font-weight:600;border-top:1px solid #e0e0e0;margin-top:4px;padding-top:8px;}
.note{font-size:11px;color:#888;margin-top:8px;}
.yr-badge{display:inline-block;font-size:10px;padding:1px 8px;border-radius:20px;background:#EAF3DE;color:#3B6D11;margin-left:6px;vertical-align:middle;}
</style>
</head>
<body>
<div class="wrap">
  <div id="login-screen">
    <div class="login-card">
      <div class="login-title">&#128200; Sales incentive calculator</div>
      <div class="login-sub">Sign in to access your data, or register if you're new.</div>
      <div class="field"><label>Username</label><input type="text" id="l-user" placeholder="e.g. ali" autocomplete="username"></div>
      <div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="Your password" onkeydown="if(event.key==='Enter')login()"></div>
      <div class="btn-row"><button class="bp" onclick="login()">Sign in</button><button class="bs" onclick="showReg()">Register</button></div>
      <div class="err" id="l-err"></div>
    </div>
    <div class="login-card" id="reg-card" style="display:none;margin-top:1rem;">
      <div class="login-title">Create account</div>
      <div class="login-sub">Pick a unique username and password. Keep it safe — cannot be recovered.</div>
      <div class="field"><label>Username</label><input type="text" id="r-user" placeholder="e.g. ali"></div>
      <div class="field"><label>Password</label><input type="password" id="r-pass" placeholder="Min 4 characters"></div>
      <div class="field"><label>Confirm password</label><input type="password" id="r-pass2" placeholder="Repeat password" onkeydown="if(event.key==='Enter')register()"></div>
      <div class="btn-row"><button class="bp" onclick="register()">Create account</button><button class="bs" onclick="hideReg()">Cancel</button></div>
      <div class="err" id="r-err"></div><div class="ok" id="r-ok"></div>
    </div>
  </div>

  <div class="app-wrap" id="app-wrap">
    <div class="top-bar">
      <div class="user-chip">&#128100; <span id="logged-name"></span></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="save-badge" id="save-badge">&#10003; Saved</span>
        <button class="logout-btn" onclick="logout()">Sign out</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('q1')">Q1</button>
      <button class="tab-btn" onclick="switchTab('q2')">Q2</button>
      <button class="tab-btn hy" onclick="switchTab('h1')">H1</button>
      <div class="tab-sep"></div>
      <button class="tab-btn" onclick="switchTab('q3')">Q3</button>
      <button class="tab-btn" onclick="switchTab('q4')">Q4</button>
      <button class="tab-btn hy" onclick="switchTab('h2')">H2</button>
      <div class="tab-sep"></div>
      <button class="tab-btn yr" onclick="switchTab('yr')">Full year</button>
    </div>
    <div id="tab-q1" class="tab-panel active"></div>
    <div id="tab-q2" class="tab-panel"></div>
    <div id="tab-h1" class="tab-panel"></div>
    <div id="tab-q3" class="tab-panel"></div>
    <div id="tab-q4" class="tab-panel"></div>
    <div id="tab-h2" class="tab-panel"></div>
    <div id="tab-yr" class="tab-panel"></div>
  </div>
</div>

<script>
const GROUPS=[
  {id:'g1',name:'Cort / Firm / Pico',weight:0.20,tag:'20%',tc:'tag-b',subs:[{id:'cort',name:'Cort'},{id:'firm',name:'Firm'},{id:'pico',name:'Pico'}]},
  {id:'g2',name:'Gly / Min',weight:0.20,tag:'20%',tc:'tag-b',subs:[{id:'gly',name:'Gly'},{id:'min',name:'Min'}]},
  {id:'g3',name:'Pentasa',weight:0.30,tag:'30%',tc:'tag-p',subs:null},
  {id:'g4',name:'Nocdurna',weight:0.30,tag:'30%',tc:'tag-p',subs:null},
];
const MAX=6250,THR=0.90,QS=['q1','q2','q3','q4'];
let currentUser='',saveTimer=null;
const CS={q1:null,q2:null,q3:null,q4:null};

function hash(s){let h=0;for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return h.toString(36);}
function uKey(u){return'sic_u_'+hash(u.toLowerCase());}
function dKey(u,p){return'sic_d_'+hash(u.toLowerCase()+'|'+p);}

function login(){
  const u=document.getElementById('l-user').value.trim();const p=document.getElementById('l-pass').value;const e=document.getElementById('l-err');
  if(!u||!p){e.textContent='Please enter username and password.';return;}
  const reg=localStorage.getItem(uKey(u));
  if(!reg){e.textContent='Username not found. Please register first.';return;}
  if(JSON.parse(reg).ph!==hash(p)){e.textContent='Incorrect password.';return;}
  e.textContent='';currentUser=u;window._dk=dKey(u,p);enterApp(u);
}
function register(){
  const u=document.getElementById('r-user').value.trim();const p=document.getElementById('r-pass').value;const p2=document.getElementById('r-pass2').value;
  const e=document.getElementById('r-err');const ok=document.getElementById('r-ok');e.textContent='';ok.textContent='';
  if(u.length<2){e.textContent='Username must be at least 2 characters.';return;}
  if(p.length<4){e.textContent='Password must be at least 4 characters.';return;}
  if(p!==p2){e.textContent='Passwords do not match.';return;}
  if(localStorage.getItem(uKey(u))){e.textContent='Username already taken.';return;}
  localStorage.setItem(uKey(u),JSON.stringify({ph:hash(p)}));
  ok.textContent='Account created! You can now sign in.';
  setTimeout(()=>{hideReg();document.getElementById('l-user').value=u;document.getElementById('l-pass').value='';},1200);
}
function showReg(){document.getElementById('reg-card').style.display='block';}
function hideReg(){document.getElementById('reg-card').style.display='none';}
function logout(){saveData();currentUser='';window._dk='';document.getElementById('app-wrap').style.display='none';document.getElementById('login-screen').style.display='block';document.getElementById('l-pass').value='';document.getElementById('l-err').textContent='';}
function enterApp(u){document.getElementById('login-screen').style.display='none';document.getElementById('app-wrap').style.display='block';document.getElementById('logged-name').textContent=u;buildPanels();loadData();}

function saveData(){
  if(!currentUser||!window._dk)return;
  const data={};
  QS.forEach(q=>{data[q]={};GROUPS.forEach(g=>{
    if(g.subs){g.subs.forEach(s=>{const t=document.getElementById(q+'_t_'+g.id+'_'+s.id);const a=document.getElementById(q+'_a_'+g.id+'_'+s.id);if(t)data[q][q+'_t_'+g.id+'_'+s.id]=t.value;if(a)data[q][q+'_a_'+g.id+'_'+s.id]=a.value;});}
    else{const t=document.getElementById(q+'_t_'+g.id);const a=document.getElementById(q+'_a_'+g.id);if(t)data[q][q+'_t_'+g.id]=t.value;if(a)data[q][q+'_a_'+g.id]=a.value;}
  });});
  try{localStorage.setItem(window._dk,JSON.stringify(data));showSaved();}catch(e){}
}
function loadData(){
  try{const raw=localStorage.getItem(window._dk);if(!raw)return;const data=JSON.parse(raw);
  QS.forEach(q=>{if(!data[q])return;Object.keys(data[q]).forEach(id=>{const el=document.getElementById(id);if(el)el.value=data[q][id];});});
  QS.forEach(q=>calc(q));}catch(e){}
}
function showSaved(){const b=document.getElementById('save-badge');b.style.display='inline';clearTimeout(saveTimer);saveTimer=setTimeout(()=>b.style.display='none',2000);}
function dbSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveData,700);}
function payPct(a,uncapped){if(a<THR)return 0;const pp=0.5+Math.floor((a-THR)/0.01)*0.05;return uncapped?pp:Math.min(pp,1.0);}
function rm(n){return'RM '+n.toFixed(2);}
function fp(n){return(n*100).toFixed(2)+'%';}
function getVals(q,g){
  if(g.subs){let t=0,a=0;g.subs.forEach(s=>{t+=parseFloat(document.getElementById(q+'_t_'+g.id+'_'+s.id).value)||0;a+=parseFloat(document.getElementById(q+'_a_'+g.id+'_'+s.id).value)||0;});return{tgt:t,act:a};}
  return{tgt:parseFloat(document.getElementById(q+'_t_'+g.id).value)||0,act:parseFloat(document.getElementById(q+'_a_'+g.id).value)||0};
}
function buildPanel(q){
  let rows='';
  GROUPS.forEach(g=>{
    const pm=MAX*g.weight;
    if(g.subs){
      g.subs.forEach(s=>{rows+=`<tr class="sub-row"><td><div class="sub-name">${s.name}</div></td><td><input type="number" id="${q}_t_${g.id}_${s.id}" placeholder="0.00" min="0" step="0.01" oninput="onInput('${q}')"></td><td><input type="number" id="${q}_a_${g.id}_${s.id}" placeholder="0.00" min="0" step="0.01" oninput="onInput('${q}')"></td><td></td><td></td></tr>`;});
      rows+=`<tr class="comb-row"><td><strong>${g.name}</strong><span class="tag ${g.tc}">${g.tag}</span><span style="font-size:10px;"> combined</span><br><span style="font-size:10px;color:#888;">Max: ${rm(pm)}</span></td><td id="${q}_ct_${g.id}">—</td><td id="${q}_ca_${g.id}">—</td><td><div class="ach-val" id="${q}_ach_${g.id}" style="color:#888;">—</div><div class="bar-wrap"><div class="bar-fill" id="${q}_bar_${g.id}" style="width:0%"></div></div></td><td id="${q}_pc_${g.id}"><div class="pay-val" id="${q}_pay_${g.id}">—</div><div class="pay-sub" id="${q}_sub_${g.id}"></div></td></tr>`;
    }else{
      rows+=`<tr><td><div style="font-weight:600;">${g.name}<span class="tag ${g.tc}">${g.tag}</span></div><div style="font-size:11px;color:#888;">Max: ${rm(pm)}</div></td><td><input type="number" id="${q}_t_${g.id}" placeholder="0.00" min="0" step="0.01" oninput="onInput('${q}')"></td><td><input type="number" id="${q}_a_${g.id}" placeholder="0.00" min="0" step="0.01" oninput="onInput('${q}')"></td><td><div class="ach-val" id="${q}_ach_${g.id}" style="color:#888;">—</div><div class="bar-wrap"><div class="bar-fill" id="${q}_bar_${g.id}" style="width:0%"></div></div></td><td id="${q}_pc_${g.id}"><div class="pay-val" id="${q}_pay_${g.id}">—</div><div class="pay-sub" id="${q}_sub_${g.id}"></div></td></tr>`;
    }
  });
  return`<div class="sec-label">${q.toUpperCase()} product targets &amp; actuals</div><table><colgroup><col style="width:26%"><col style="width:16%"><col style="width:16%"><col style="width:18%"><col style="width:24%"></colgroup><thead><tr><th>Product</th><th>Target (RM)</th><th>Actual (RM)</th><th>Achieve %</th><th>Payout (RM)</th></tr></thead><tbody>${rows}</tbody><tfoot><tr class="tbl-total"><td>Overall weighted</td><td></td><td></td><td id="${q}_tach">—</td><td id="${q}_tpay">—</td></tr></tfoot></table><div id="${q}_alert"></div><p class="note" id="${q}_note" style="display:none;">&#8505; Check H1 / H2 / Full year tabs for rollback and yearly summary.</p>`;
}
function buildPanels(){
  QS.forEach(q=>{document.getElementById('tab-'+q).innerHTML=buildPanel(q);});
  document.getElementById('tab-h1').innerHTML=`<div id="h1-content"><div class="alert a-info">&#8505; Fill in Q1 and Q2 — H1 will update automatically.</div></div>`;
  document.getElementById('tab-h2').innerHTML=`<div id="h2-content"><div class="alert a-info">&#8505; Fill in Q3 and Q4 — H2 will update automatically.</div></div>`;
  document.getElementById('tab-yr').innerHTML=`<div id="yr-content"><div class="alert a-info">&#8505; Fill in all 4 quarters — full year will update automatically.</div></div>`;
}
function onInput(q){calc(q);dbSave();}
function calc(q){
  let wtd=0,filled=true;
  const details=GROUPS.map(g=>{
    const{tgt,act}=getVals(q,g);if(!tgt)filled=false;
    const ach=tgt>0?act/tgt:0;wtd+=ach*g.weight;
    if(g.subs){const ct=document.getElementById(q+'_ct_'+g.id);const ca=document.getElementById(q+'_ca_'+g.id);if(ct)ct.textContent=tgt>0?rm(tgt):'—';if(ca)ca.textContent=act>0?rm(act):'—';}
    const ae=document.getElementById(q+'_ach_'+g.id);const be=document.getElementById(q+'_bar_'+g.id);
    if(tgt>0){ae.textContent=fp(ach);ae.style.color=ach>=0.9?'#27500A':'#c45a00';be.style.width=Math.min(ach*100,100).toFixed(1)+'%';be.style.background=ach>=0.9?'#639922':'#e07800';}
    else{ae.textContent='—';ae.style.color='#888';be.style.width='0%';}
    return{...g,tgt,act,ach};
  });
  const eligible=filled&&wtd>=THR;let total=0;
  details.forEach(g=>{
    const pm=MAX*g.weight;const pe=document.getElementById(q+'_pay_'+g.id);const se=document.getElementById(q+'_sub_'+g.id);const ce=document.getElementById(q+'_pc_'+g.id);
    if(!filled){pe.textContent='—';pe.style.color='#888';se.textContent='';ce.classList.remove('locked');}
    else if(!eligible){pe.textContent='RM 0.00';pe.style.color='#c0392b';se.textContent='Overall <90% — locked';ce.classList.add('locked');}
    else{const pp=payPct(g.ach,false);const earned=pp*pm;total+=earned;ce.classList.remove('locked');if(pp>0){pe.textContent=rm(earned);pe.style.color='#111';se.textContent=fp(g.ach)+' hit → '+fp(pp)+' of '+rm(pm);}else{pe.textContent='RM 0.00';pe.style.color='#c0392b';se.textContent='Product <90% — no payout';}}
  });
  document.getElementById(q+'_tach').textContent=filled?fp(wtd):'—';
  document.getElementById(q+'_tpay').textContent=!filled?'—':eligible?rm(total):'RM 0.00';
  const al=document.getElementById(q+'_alert');
  if(!filled)al.innerHTML='';
  else if(!eligible)al.innerHTML=`<div class="alert a-warn">&#9888; Overall weighted achievement ${fp(wtd)} — below 90%. All product payouts are locked.</div>`;
  else al.innerHTML=`<div class="alert a-ok">&#10003; Overall ${fp(wtd)} — eligible! Total incentive: ${rm(total)}</div>`;
  document.getElementById(q+'_note').style.display=filled?'block':'none';
  CS[q]=filled?{wtd,eligible,earned:total,details}:null;
  if(CS.q1&&CS.q2)renderHalf('h1',CS.q1,CS.q2);
  if(CS.q3&&CS.q4)renderHalf('h2',CS.q3,CS.q4);
  if(CS.q1&&CS.q2&&CS.q3&&CS.q4)renderYear();
}
function renderHalf(hid,qa,qb){
  const hl=hid==='h1'?'H1':'H2';const qal=hid==='h1'?'Q1':'Q3';const qbl=hid==='h1'?'Q2':'Q4';
  let hw=0;
  const hd=GROUPS.map((g,i)=>{const tgt=qa.details[i].tgt+qb.details[i].tgt;const act=qa.details[i].act+qb.details[i].act;const ach=tgt>0?act/tgt:0;hw+=ach*g.weight;return{...g,tgt,act,ach};});
  const elig=hw>=THR;let htot=0,prows='';
  hd.forEach(g=>{
    const pm=MAX*2*g.weight;const pp=elig?payPct(g.ach,false):0;const pe=pp*pm;htot+=pe;
    const bw=Math.min(g.ach*100,100).toFixed(1);const ac=g.ach>=0.9?'#27500A':'#c45a00';const bc=g.ach>=0.9?'#639922':'#e07800';const pc=pp>0?'#111':'#c0392b';
    const ps=!elig?'Overall <90% — locked':pp>0?fp(g.ach)+' hit → '+fp(pp)+' of '+rm(pm):'Product <90% — no payout';
    const nn=g.subs?` <span style="font-size:10px;font-style:italic;">(combined)</span>`:'';
    prows+=`<tr><td><div style="font-weight:600;">${g.name}${nn}<span class="tag ${g.tc}">${g.tag}</span></div><div style="font-size:11px;color:#888;">Half-year max: ${rm(pm)}</div></td><td>${rm(g.tgt)}</td><td>${rm(g.act)}</td><td><div class="ach-val" style="color:${ac};">${fp(g.ach)}</div><div class="bar-wrap"><div class="bar-fill" style="width:${bw}%;background:${bc};"></div></div></td><td><div class="pay-val" style="color:${pc};">${elig&&pp>0?rm(pe):'RM 0.00'}</div><div class="pay-sub">${ps}</div></td></tr>`;
  });
  const paid=qa.earned+qb.earned;const cap=Math.min(htot,MAX*2);const rb=Math.max(0,cap-paid);const net=paid+rb;
  const ah=!elig?`<div class="alert a-warn">&#9888; ${hl} overall ${fp(hw)} — below 90%. No rollback payable.</div>`:rb>0?`<div class="alert a-ok">&#10003; ${hl} eligible! Rollback of ${rm(rb)} payable.</div>`:`<div class="alert a-ok">&#10003; ${hl} eligible. No additional rollback — quarterly payments already covered.</div>`;
  document.getElementById(hid+'-content').innerHTML=`<div class="sec-label">${hl} combined performance</div><table><colgroup><col style="width:26%"><col style="width:16%"><col style="width:16%"><col style="width:18%"><col style="width:24%"></colgroup><thead><tr><th>Product</th><th>${hl} target (RM)</th><th>${hl} actual (RM)</th><th>Achieve %</th><th>${hl} payout (RM)</th></tr></thead><tbody>${prows}</tbody><tfoot><tr class="tbl-total"><td>Overall weighted</td><td></td><td></td><td>${fp(hw)}</td><td>${rm(cap)}</td></tr></tfoot></table>${ah}<div class="sec-label">Rollback reconciliation</div><div class="rb-box"><div class="rb-row"><span>${qal} incentive paid</span><span>${rm(qa.earned)}</span></div><div class="rb-row"><span>${qbl} incentive paid</span><span>${rm(qb.earned)}</span></div><div class="rb-row"><span>Total paid to date</span><span>${rm(paid)}</span></div><div class="rb-row"><span>${hl} entitlement (payout capped 100%×2)</span><span>${rm(cap)}</span></div><div class="rb-row rb-total"><span>Rollback payable now</span><span style="color:${rb>0?'#27500A':'#111'};">${rm(rb)}</span></div><div class="rb-row rb-total"><span>Net total for ${hl}</span><span>${rm(net)}</span></div></div>`;
}
function renderYear(){
  if(!CS.q1||!CS.q2||!CS.q3||!CS.q4)return;
  let yw=0;
  const yd=GROUPS.map((g,i)=>{const tgt=CS.q1.details[i].tgt+CS.q2.details[i].tgt+CS.q3.details[i].tgt+CS.q4.details[i].tgt;const act=CS.q1.details[i].act+CS.q2.details[i].act+CS.q3.details[i].act+CS.q4.details[i].act;const ach=tgt>0?act/tgt:0;yw+=ach*g.weight;return{...g,tgt,act,ach};});
  const elig=yw>=THR;let ytot=0,prows='';
  yd.forEach(g=>{
    const pm=MAX*4*g.weight;const pp=elig?payPct(g.ach,true):0;const pe=pp*pm;ytot+=pe;
    const bw=Math.min(g.ach*100,100).toFixed(1);const ac=g.ach>=0.9?'#27500A':'#c45a00';const bc=g.ach>=0.9?'#639922':'#e07800';const pc=pp>0?'#111':'#c0392b';
    const ps=!elig?'Overall <90% — locked':pp>0?fp(g.ach)+' hit → '+fp(pp)+' (uncapped) of '+rm(pm):'Product <90% — no payout';
    const nn=g.subs?` <span style="font-size:10px;font-style:italic;">(combined)</span>`:'';
    prows+=`<tr><td><div style="font-weight:600;">${g.name}${nn}<span class="tag ${g.tc}">${g.tag}</span></div><div style="font-size:11px;color:#888;">Year base: ${rm(pm)}</div></td><td>${rm(g.tgt)}</td><td>${rm(g.act)}</td><td><div class="ach-val" style="color:${ac};">${fp(g.ach)}</div><div class="bar-wrap"><div class="bar-fill" style="width:${bw}%;background:${bc};"></div></div></td><td><div class="pay-val" style="color:${pc};">${elig&&pp>0?rm(pe):'RM 0.00'}</div><div class="pay-sub">${ps}</div></td></tr>`;
  });
  const paid=CS.q1.earned+CS.q2.earned+CS.q3.earned+CS.q4.earned;const rb=Math.max(0,ytot-paid);const net=paid+rb;
  const ah=!elig?`<div class="alert a-warn">&#9888; Full year overall ${fp(yw)} — below 90%. No rollback payable.</div>`:rb>0?`<div class="alert a-ok">&#10003; Full year eligible! Rollback of ${rm(rb)} payable (payout uncapped).</div>`:`<div class="alert a-ok">&#10003; Full year eligible. No additional rollback — quarterly payments already covered.</div>`;
  document.getElementById('yr-content').innerHTML=`<div class="sec-label">Full year performance <span class="yr-badge">Payout uncapped</span></div><table><colgroup><col style="width:26%"><col style="width:16%"><col style="width:16%"><col style="width:18%"><col style="width:24%"></colgroup><thead><tr><th>Product</th><th>Year target (RM)</th><th>Year actual (RM)</th><th>Achieve %</th><th>Year payout (RM)</th></tr></thead><tbody>${prows}</tbody><tfoot><tr class="tbl-total"><td>Overall weighted</td><td></td><td></td><td>${fp(yw)}</td><td style="color:#3B6D11;">${rm(ytot)}</td></tr></tfoot></table>${ah}<div class="sec-label">Full year reconciliation</div><div class="rb-box"><div class="rb-row"><span>Q1 incentive paid</span><span>${rm(CS.q1.earned)}</span></div><div class="rb-row"><span>Q2 incentive paid</span><span>${rm(CS.q2.earned)}</span></div><div class="rb-row"><span>Q3 incentive paid</span><span>${rm(CS.q3.earned)}</span></div><div class="rb-row"><span>Q4 incentive paid</span><span>${rm(CS.q4.earned)}</span></div><div class="rb-row"><span>Total paid to date</span><span>${rm(paid)}</span></div><div class="rb-row"><span>Full year entitlement (no cap)</span><span style="color:#3B6D11;">${rm(ytot)}</span></div><div class="rb-row rb-total"><span>Rollback payable now</span><span style="color:${rb>0?'#27500A':'#111'};">${rm(rb)}</span></div><div class="rb-row rb-total"><span>Net total for full year</span><span>${rm(net)}</span></div></div>`;
}
function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const tabs=['q1','q2','h1','q3','q4','h2','yr'];
  document.querySelectorAll('.tab-btn')[tabs.indexOf(t)].classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='h1'&&CS.q1&&CS.q2)renderHalf('h1',CS.q1,CS.q2);
  if(t==='h2'&&CS.q3&&CS.q4)renderHalf('h2',CS.q3,CS.q4);
  if(t==='yr'&&CS.q1&&CS.q2&&CS.q3&&CS.q4)renderYear();
}
</script>
</body>
</html>
