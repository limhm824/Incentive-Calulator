
<style>
*{box-sizing:border-box;}
.wrap{padding:1rem 0;font-size:14px;color:var(--color-text-primary);}
.login-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:2rem;max-width:360px;margin:2rem auto;}
.login-title{font-size:16px;font-weight:500;margin-bottom:0.25rem;}
.login-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.5rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;}
.field input{width:100%;font-size:14px;}
.btn-row{display:flex;gap:8px;margin-top:1.25rem;}
.bp{flex:1;padding:9px;font-size:14px;font-weight:500;cursor:pointer;border-radius:var(--border-radius-md);background:var(--color-text-primary);border:none;color:var(--color-background-primary);}
.bp:hover{opacity:0.85;}
.bs{flex:1;padding:9px;font-size:14px;font-weight:500;cursor:pointer;border-radius:var(--border-radius-md);background:transparent;border:0.5px solid var(--color-border-secondary);color:var(--color-text-primary);}
.bs:hover{background:var(--color-background-secondary);}
.err{font-size:12px;color:var(--color-text-danger);margin-top:8px;min-height:16px;}
.ok{font-size:12px;color:var(--color-text-success);margin-top:8px;min-height:16px;}
.app-wrap{display:none;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.user-chip{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--color-text-secondary);}
.logout-btn{font-size:12px;cursor:pointer;color:var(--color-text-secondary);background:transparent;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:4px 10px;}
.logout-btn:hover{background:var(--color-background-secondary);}
.save-badge{font-size:11px;color:var(--color-text-success);display:none;}
.tabs{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:1.5rem;border-bottom:0.5px solid var(--color-border-tertiary);}
.tab-btn{padding:6px 14px;font-size:13px;font-weight:500;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--color-text-secondary);margin-bottom:-0.5px;white-space:nowrap;}
.tab-btn.active{color:var(--color-text-primary);border-bottom:2px solid var(--color-text-primary);}
.tab-btn.hy{color:var(--color-text-info);}
.tab-btn.hy.active{border-bottom-color:#378ADD;}
.tab-btn.yr{color:var(--color-text-success);}
.tab-btn.yr.active{border-bottom-color:#639922;}
.tab-sep{width:1px;background:var(--color-border-tertiary);margin:0 4px 0.5px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.sec-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin:1.25rem 0 0.6rem;}
.tbl{width:100%;border-collapse:collapse;table-layout:fixed;}
.tbl th{font-size:11px;color:var(--color-text-secondary);font-weight:500;padding:4px 6px;text-align:right;border-bottom:0.5px solid var(--color-border-tertiary);}
.tbl th:first-child{text-align:left;}
.tbl td{padding:7px 6px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle;font-size:13px;text-align:right;}
.tbl td:first-child{text-align:left;}
.sub-row td{background:var(--color-background-secondary);}
.sub-row td:first-child{padding-left:18px;}
.sub-name{font-size:12px;color:var(--color-text-secondary);}
.comb-row td{background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-secondary);}
.comb-row td:first-child{padding-left:18px;}
.tbl-total td{font-weight:500;background:var(--color-background-secondary);border-top:0.5px solid var(--color-border-secondary);border-bottom:none;}
.tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:20px;margin-left:4px;}
.tag-b{background:#E6F1FB;color:#0C447C;}
.tag-p{background:#EEEDFE;color:#3C3489;}
input[type=number]{width:100%;font-size:13px;}
.ach-val{font-size:13px;font-weight:500;}
.bar-wrap{background:var(--color-border-tertiary);border-radius:4px;height:4px;margin-top:3px;overflow:hidden;}
.bar-fill{height:4px;border-radius:4px;transition:width 0.25s;}
.pay-val{font-size:13px;font-weight:500;}
.pay-sub{font-size:10px;color:var(--color-text-secondary);margin-top:1px;}
.locked{opacity:0.4;}
.alert{border-radius:var(--border-radius-md);padding:10px 14px;font-size:13px;margin:0.75rem 0;}
.a-ok{background:var(--color-background-success);color:var(--color-text-success);}
.a-warn{background:var(--color-background-warning);color:var(--color-text-warning);}
.a-info{background:var(--color-background-info);color:var(--color-text-info);}
.gate-box{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 14px;margin:0.75rem 0;font-size:13px;}
.gate-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;}
.gate-label{color:var(--color-text-secondary);}
.rb-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin:0.75rem 0;}
.rb-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;}
.rb-total{font-weight:500;border-top:0.5px solid var(--color-border-tertiary);margin-top:4px;padding-top:8px;}
.note{font-size:11px;color:var(--color-text-secondary);margin-top:8px;}
.yr-badge{display:inline-block;font-size:10px;padding:1px 8px;border-radius:20px;background:var(--color-background-success);color:var(--color-text-success);margin-left:6px;vertical-align:middle;}
</style>

<div class="wrap">
<h2 style="position:absolute;left:-9999px">Sales incentive calculator full year with two-gate eligibility</h2>
<div id="login-screen">
  <div class="login-card">
    <div class="login-title"><i class="ti ti-chart-bar" aria-hidden="true"></i> Sales incentive calculator</div>
    <div class="login-sub">Sign in to access your data, or register if you're new.</div>
    <div class="field"><label>Username</label><input type="text" id="l-user" placeholder="e.g. ali" autocomplete="username"></div>
    <div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="Your password" onkeydown="if(event.key==='Enter')login()"></div>
    <div class="btn-row"><button class="bp" onclick="login()">Sign in</button><button class="bs" onclick="showReg()">Register</button></div>
    <div class="err" id="l-err"></div>
  </div>
  <div class="login-card" id="reg-card" style="display:none;margin-top:1rem;">
    <div class="login-title">Create account</div>
    <div class="login-sub">Pick a unique username and password. Keep it safe — cannot be recovered.</div>
    <div class="field"><label>Username</label><input type="text" id="r-user" placeholder="e.g. ali"></div>
    <div class="field"><label>Password</label><input type="password" id="r-pass" placeholder="Min 4 characters"></div>
    <div class="field"><label>Confirm password</label><input type="password" id="r-pass2" onkeydown="if(event.key==='Enter')register()"></div>
    <div class="btn-row"><button class="bp" onclick="register()">Create account</button><button class="bs" onclick="hideReg()">Cancel</button></div>
    <div class="err" id="r-err"></div><div class="ok" id="r-ok"></div>
  </div>
</div>

<div class="app-wrap" id="app-wrap">
  <div class="top-bar">
    <div class="user-chip"><i class="ti ti-user" style="font-size:15px;" aria-hidden="true"></i> <span id="logged-name"></span></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="save-badge" id="save-badge"><i class="ti ti-check" aria-hidden="true"></i> Saved</span>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('q1')">Q1</button>
    <button class="tab-btn" onclick="switchTab('q2')">Q2</button>
    <button class="tab-btn hy" onclick="switchTab('h1')">H1</button>
    <div class="tab-sep"></div>
    <button class="tab-btn" onclick="switchTab('q3')">Q3</button>
    <button class="tab-btn" onclick="switchTab('q4')">Q4</button>
    <button class="tab-btn hy" onclick="switchTab('h2')">H2</button>
    <div class="tab-sep"></div>
    <button class="tab-btn yr" onclick="switchTab('yr')">Full year</button>
  </div>
  <div id="tab-q1" class="tab-panel active"></div>
  <div id="tab-q2" class="tab-panel"></div>
  <div id="tab-h1" class="tab-panel"></div>
  <div id="tab-q3" class="tab-panel"></div>
  <div id="tab-q4" class="tab-panel"></div>
  <div id="tab-h2" class="tab-panel"></div>
  <div id="tab-yr" class="tab-panel"></div>
</div>
</div>

<script>
const GROUPS=[
  {id:'g1',name:'Cort / Firm / Pico',weight:0.20,tag:'20%',tc:'tag-b',subs:[{id:'cort',name:'Cort'},{id:'firm',name:'Firm'},{id:'pico',name:'Pico'}]},
  {id:'g2',name:'Gly / Min',weight:0.20,tag:'20%',tc:'tag-b',subs:[{id:'gly',name:'Gly'},{id:'min',name:'Min'}]},
  {id:'g3',name:'Pentasa',weight:0.30,tag:'30%',tc:'tag-p',subs:null},
  {id:'g4',name:'Nocdurna',weight:0.30,tag:'30%',tc:'tag-p',subs:null},
];
const MAX=6250,THR=0.90,QS=['q1','q2','q3','q4'];
let currentUser='',saveTimer=null;
const CS={q1:null,q2:null,q3:null,q4:null};

function hash(s){let h=0;for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return h.toString(36);}
function uKey(u){return'sic_u_'+hash(u.toLowerCase());}
function dKey(u,p){return'sic_d_'+hash(u.toLowerCase()+'|'+p);}

function login(){
  const u=document.getElementById('l-user').value.trim(),p=document.getElementById('l-pass').value,e=document.getElementById('l-err');
  if(!u||!p){e.textContent='Please enter username and password.';return;}
  const reg=localStorage.getItem(uKey(u));
  if(!reg){e.textContent='Username not found. Please register first.';return;}
  if(JSON.parse(reg).ph!==hash(p)){e.textContent='Incorrect password.';return;}
  e.textContent='';currentUser=u;window._dk=dKey(u,p);enterApp(u);
}
function register(){
  const u=document.getElementById('r-user').value.trim(),p=document.getElementById('r-pass').value,p2=document.getElementById('r-pass2').value;
  const e=document.getElementById('r-err'),ok=document.getElementById('r-ok');e.textContent='';ok.textContent='';
  if(u.length<2){e.textContent='Username must be at least 2 characters.';return;}
  if(p.length<4){e.textContent='Password must be at least 4 characters.';return;}
  if(p!==p2){e.textContent='Passwords do not match.';return;}
  if(localStorage.getItem(uKey(u))){e.textContent='Username already taken.';return;}
  localStorage.setItem(uKey(u),JSON.stringify({ph:hash(p)}));
  ok.textContent='Account created! You can now sign in.';
  setTimeout(()=>{hideReg();document.getElementById('l-user').value=u;document.getElementById('l-pass').value='';},1200);
}
function showReg(){document.getElementById('reg-card').style.display='block';}
function hideReg(){document.getElementById('reg-card').style.display='none';}
function logout(){saveData();currentUser='';window._dk='';document.getElementById('app-wrap').style.display='none';document.getElementById('login-screen').style.display='block';document.getElementById('l-pass').value='';document.getElementById('l-err').textContent='';}
function enterApp(u){document.getElementById('login-screen').style.display='none';document.getElementById('app-wrap').style.display='block';document.getElementById('logged-name').textContent=u;buildPanels();loadData();}

function saveData(){
  if(!currentUser||!window._dk)return;
  const data={};
  QS.forEach(q=>{data[q]={};GROUPS.forEach(g=>{
    if(g.subs){g.subs.forEach(s=>{const t=document.getElementById(q+'_t_'+g.id+'_'+s.id);const a=document.getElementById(q+'_a_'+g.id+'_'+s.id);if(t)data[q][q+'_t_'+g.id+'_'+s.id]=t.value;if(a)data[q][q+'_a_'+g.id+'_'+s.id]=a.value;});}
    else{const t=document.getElementById(q+'_t_'+g.id);const a=document.getElementById(q+'_a_'+g.id);if(t)data[q][q+'_t_'+g.id]=t.value;if(a)data[q][q+'_a_'+g.id]=a.value;}
  });});
  try{localStorage.setItem(window._dk,JSON.stringify(data));showSaved();}catch(e){}
}
function loadData(){
  try{const raw=localStorage.getItem(window._dk);if(!raw)return;const data=JSON.parse(raw);
  QS.forEach(q=>{if(!data[q])return;Object.keys(data[q]).forEach(id=>{const el=document.getElementById(id);if(el)el.value=data[q][id];});});
  QS.forEach(q=>calc(q));}catch(e){}
}
function showSaved(){const b=document.getElementById('save-badge');b.style.display='inline';clearTimeout(saveTimer);saveTimer=setTimeout(()=>b.style.display='none',2000);}
function dbSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveData,700);}

function payPct(a,uncapped){if(a<THR)return 0;const pp=0.5+Math.floor((a-THR)/0.01)*0.05;return uncapped?pp:Math.min(pp,1.0);}
function rm(n){return'RM '+n.toFixed(2);}
function fp(n){return(n*100).toFixed(2)+'%';}

function getVals(q,g){
  if(g.subs){let t=0,a=0;g.subs.forEach(s=>{t+=parseFloat(document.getElementById(q+'_t_'+g.id+'_'+s.id).value)||0;a+=parseFloat(document.getElementById(q+'_a_'+g.id+'_'+s.id).value)||0;});return{tgt:t,act:a};}
  return{tgt:parseFloat(document.getElementById(q+'_t_'+g.id).value)||0,act:parseFloat(document.getElementById(q+'_a_'+g.id).value)||0};
}

function buildPanel(q){
  let rows='';
  GROUPS.forEach(g=>{
    const pm=MAX*g.weight;
    if(g.subs){
      g.subs.forEach(s=>{rows+=`<tr class="sub-row"><td><div class="sub-name">${s.name}</div></td><td><input type="number" id="${q}_t_${g.id}_${s.id}" placeholder="0.00" min="0" step="0.01" oninput="onInput('${q}')"></td><td><input type="number" id="${q}_a_${g.id}_${s.id}" placeholder="0.00" min="0" step="0.01" oninput="onInput('${q}')"></td><td></td><td></td></tr>`;});
      rows+=`<tr class="comb-row"><td><strong style="color:var(--color-text-primary);">${g.name}</strong><span class="tag ${g.tc}">${g.tag}</span><span style="font-size:10px;"> combined</span><br><span style="font-size:10px;color:var(--color-text-secondary);">Max: ${rm(pm)}</span></td><td id="${q}_ct_${g.id}">—</td><td id="${q}_ca_${g.id}">—</td><td><div class="ach-val" id="${q}_ach_${g.id}" style="color:var(--color-text-secondary);">—</div><div class="bar-wrap"><div class="bar-fill" id="${q}_bar_${g.id}" style="width:0%"></div></div></td><td id="${q}_pc_${g.id}"><div class="pay-val" id="${q}_pay_${g.id}">—</div><div class="pay-sub" id="${q}_sub_${g.id}"></div></td></tr>`;
    }else{
      rows+=`<tr><td><div style="font-weight:500;">${g.name}<span class="tag ${g.tc}">${g.tag}</span></div><div style="font-size:11px;color:var(--color-text-secondary);">Max: ${rm(pm)}</div></td><td><input type="number" id="${q}_t_${g.id}" placeholder="0.00" min="0" step="0.01" oninput="onInput('${q}')"></td><td><input type="number" id="${q}_a_${g.id}" placeholder="0.00" min="0" step="0.01" oninput="onInput('${q}')"></td><td><div class="ach-val" id="${q}_ach_${g.id}" style="color:var(--color-text-secondary);">—</div><div class="bar-wrap"><div class="bar-fill" id="${q}_bar_${g.id}" style="width:0%"></div></div></td><td id="${q}_pc_${g.id}"><div class="pay-val" id="${q}_pay_${g.id}">—</div><div class="pay-sub" id="${q}_sub_${g.id}"></div></td></tr>`;
    }
  });
  return`<div class="sec-label">${q.toUpperCase()} product targets &amp; actuals</div>
  <table class="tbl"><colgroup><col style="width:26%"><col style="width:16%"><col style="width:16%"><col style="width:18%"><col style="width:24%"></colgroup>
  <thead><tr><th>Product</th><th>Target (RM)</th><th>Actual (RM)</th><th>Achieve %</th><th>Payout (RM)</th></tr></thead>
  <tbody>${rows}</tbody>
  <tfoot><tr class="tbl-total"><td>Overall (simple sum)</td><td id="${q}_stgt">—</td><td id="${q}_sact">—</td><td id="${q}_tach">—</td><td id="${q}_tpay">—</td></tr></tfoot></table>
  <div id="${q}_gate"></div>
  <div id="${q}_alert"></div>
  <p class="note" id="${q}_note" style="display:none;"><i class="ti ti-info-circle" aria-hidden="true"></i> Check H1 / H2 / Full year tabs for rollback.</p>`;
}

function buildPanels(){
  QS.forEach(q=>{document.getElementById('tab-'+q).innerHTML=buildPanel(q);});
  document.getElementById('tab-h1').innerHTML=`<div id="h1-content"><div class="alert a-info"><i class="ti ti-info-circle" aria-hidden="true"></i> Fill in Q1 and Q2 — H1 updates automatically.</div></div>`;
  document.getElementById('tab-h2').innerHTML=`<div id="h2-content"><div class="alert a-info"><i class="ti ti-info-circle" aria-hidden="true"></i> Fill in Q3 and Q4 — H2 updates automatically.</div></div>`;
  document.getElementById('tab-yr').innerHTML=`<div id="yr-content"><div class="alert a-info"><i class="ti ti-info-circle" aria-hidden="true"></i> Fill in all 4 quarters — full year updates automatically.</div></div>`;
}

function onInput(q){calc(q);dbSave();}

function calc(q){
  let totalTgt=0,totalAct=0,filled=true;
  const details=GROUPS.map(g=>{
    const{tgt,act}=getVals(q,g);
    if(!tgt)filled=false;
    totalTgt+=tgt;totalAct+=act;
    // per-product achievement uncapped
    const ach=tgt>0?act/tgt:0;
    if(g.subs){
      const ct=document.getElementById(q+'_ct_'+g.id);const ca=document.getElementById(q+'_ca_'+g.id);
      if(ct)ct.textContent=tgt>0?rm(tgt):'—';if(ca)ca.textContent=act>0?rm(act):'—';
    }
    const ae=document.getElementById(q+'_ach_'+g.id);const be=document.getElementById(q+'_bar_'+g.id);
    if(tgt>0){ae.textContent=fp(ach);ae.style.color=ach>=0.9?'var(--color-text-success)':'var(--color-text-warning)';be.style.width=Math.min(ach*100,100).toFixed(1)+'%';be.style.background=ach>=0.9?'var(--color-background-success)':'var(--color-background-warning)';}
    else{ae.textContent='—';ae.style.color='var(--color-text-secondary)';be.style.width='0%';}
    return{...g,tgt,act,ach};
  });

  // GATE 1: total actual / total target (simple sum)
  const overallAch=totalTgt>0?totalAct/totalTgt:0;
  const gate1=filled&&overallAch>=THR;

  // update overall row
  if(filled){
    document.getElementById(q+'_stgt').textContent=rm(totalTgt);
    document.getElementById(q+'_sact').textContent=rm(totalAct);
    document.getElementById(q+'_tach').textContent=fp(overallAch);
  } else {
    document.getElementById(q+'_stgt').textContent='—';
    document.getElementById(q+'_sact').textContent='—';
    document.getElementById(q+'_tach').textContent='—';
  }

  // gate status box
  const gateEl=document.getElementById(q+'_gate');
  if(filled){
    const g1color=gate1?'var(--color-text-success)':'var(--color-text-danger)';
    const g1icon=gate1?'<i class="ti ti-circle-check" aria-hidden="true"></i>':'<i class="ti ti-circle-x" aria-hidden="true"></i>';
    gateEl.innerHTML=`<div class="gate-box">
      <div class="gate-row"><span class="gate-label">Gate 1 — Overall total sales (${rm(totalAct)} / ${rm(totalTgt)})</span><span style="font-weight:500;color:${g1color};">${g1icon} ${fp(overallAch)} ${gate1?'✓ Eligible':'✗ Below 90%'}</span></div>
      <div class="gate-row" style="font-size:11px;color:var(--color-text-secondary);margin-top:2px;"><span>Gate 2 — Individual product must each hit 90% to earn their payout</span></div>
    </div>`;
  } else { gateEl.innerHTML=''; }

  let total=0;
  details.forEach(g=>{
    const pm=MAX*g.weight;
    const pe=document.getElementById(q+'_pay_'+g.id);
    const se=document.getElementById(q+'_sub_'+g.id);
    const ce=document.getElementById(q+'_pc_'+g.id);
    if(!filled){pe.textContent='—';pe.style.color='var(--color-text-secondary)';se.textContent='';ce.classList.remove('locked');}
    else if(!gate1){
      // Gate 1 failed — all locked
      pe.textContent='RM 0.00';pe.style.color='var(--color-text-danger)';
      se.textContent='Overall <90% — locked';ce.classList.add('locked');
    } else {
      // Gate 1 passed — check Gate 2 per product
      const pp=payPct(g.ach,false); // capped 100% for Q/H
      const earned=pp*pm;total+=earned;
      ce.classList.remove('locked');
      if(pp>0){pe.textContent=rm(earned);pe.style.color='var(--color-text-primary)';se.textContent=fp(g.ach)+' hit → '+fp(pp)+' of '+rm(pm);}
      else{pe.textContent='RM 0.00';pe.style.color='var(--color-text-danger)';se.textContent='Product <90% — no payout';}
    }
  });

  document.getElementById(q+'_tpay').textContent=!filled?'—':gate1?rm(total):'RM 0.00';
  const al=document.getElementById(q+'_alert');
  if(!filled)al.innerHTML='';
  else if(!gate1)al.innerHTML=`<div class="alert a-warn"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Gate 1 failed — overall total sales ${fp(overallAch)}, below 90%. No payout this quarter.</div>`;
  else al.innerHTML=`<div class="alert a-ok"><i class="ti ti-circle-check" aria-hidden="true"></i> Gate 1 passed (${fp(overallAch)}). Payout by product based on individual achievement. Total: ${rm(total)}</div>`;

  document.getElementById(q+'_note').style.display=filled?'block':'none';
  CS[q]=filled?{overallAch,gate1,earned:total,totalTgt,totalAct,details}:null;
  if(CS.q1&&CS.q2)renderHalf('h1',CS.q1,CS.q2);
  if(CS.q3&&CS.q4)renderHalf('h2',CS.q3,CS.q4);
  if(CS.q1&&CS.q2&&CS.q3&&CS.q4)renderYear();
}

function renderHalf(hid,qa,qb){
  const hl=hid==='h1'?'H1':'H2';const qal=hid==='h1'?'Q1':'Q3';const qbl=hid==='h1'?'Q2':'Q4';
  // Gate 1 for half: combined total actual / total target
  const totalTgt=qa.totalTgt+qb.totalTgt;
  const totalAct=qa.totalAct+qb.totalAct;
  const overallAch=totalTgt>0?totalAct/totalTgt:0;
  const gate1=overallAch>=THR;
  let htot=0,prows='';
  GROUPS.forEach((g,i)=>{
    const tgt=qa.details[i].tgt+qb.details[i].tgt;
    const act=qa.details[i].act+qb.details[i].act;
    const ach=tgt>0?act/tgt:0;
    const pm=MAX*2*g.weight;
    const pp=gate1?payPct(ach,false):0;
    const pe=pp*pm;htot+=pe;
    const bw=Math.min(ach*100,100).toFixed(1);
    const ac=ach>=0.9?'var(--color-text-success)':'var(--color-text-warning)';
    const bc=ach>=0.9?'var(--color-background-success)':'var(--color-background-warning)';
    const pc=pp>0?'var(--color-text-primary)':'var(--color-text-danger)';
    const ps=!gate1?'Overall <90% — locked':pp>0?fp(ach)+' hit → '+fp(pp)+' of '+rm(pm):'Product <90% — no payout';
    const nn=g.subs?` <span style="font-size:10px;font-style:italic;">(combined)</span>`:'';
    prows+=`<tr><td><div style="font-weight:500;">${g.name}${nn}<span class="tag ${g.tc}">${g.tag}</span></div><div style="font-size:11px;color:var(--color-text-secondary);">Half-year max: ${rm(pm)}</div></td><td>${rm(tgt)}</td><td>${rm(act)}</td><td><div class="ach-val" style="color:${ac};">${fp(ach)}</div><div class="bar-wrap"><div class="bar-fill" style="width:${bw}%;background:${bc};"></div></div></td><td><div class="pay-val" style="color:${pc};">${gate1&&pp>0?rm(pe):'RM 0.00'}</div><div class="pay-sub">${ps}</div></td></tr>`;
  });
  const paid=qa.earned+qb.earned;
  const cap=Math.min(htot,MAX*2);
  const rb=Math.max(0,cap-paid);const net=paid+rb;
  const g1color=gate1?'var(--color-text-success)':'var(--color-text-danger)';
  const gateHtml=`<div class="gate-box"><div class="gate-row"><span class="gate-label">Gate 1 — ${hl} total sales (${rm(totalAct)} / ${rm(totalTgt)})</span><span style="font-weight:500;color:${g1color};">${fp(overallAch)} ${gate1?'✓ Eligible':'✗ Below 90%'}</span></div></div>`;
  const ah=!gate1?`<div class="alert a-warn"><i class="ti ti-alert-triangle" aria-hidden="true"></i> ${hl} overall total sales ${fp(overallAch)} — below 90%. No rollback payable.</div>`:rb>0?`<div class="alert a-ok"><i class="ti ti-circle-check" aria-hidden="true"></i> ${hl} eligible! Rollback of ${rm(rb)} payable.</div>`:`<div class="alert a-ok"><i class="ti ti-circle-check" aria-hidden="true"></i> ${hl} eligible. No additional rollback needed.</div>`;
  document.getElementById(hid+'-content').innerHTML=`
    <div class="sec-label">${hl} combined performance</div>
    <table class="tbl"><colgroup><col style="width:26%"><col style="width:16%"><col style="width:16%"><col style="width:18%"><col style="width:24%"></colgroup>
    <thead><tr><th>Product</th><th>${hl} target (RM)</th><th>${hl} actual (RM)</th><th>Achieve %</th><th>${hl} payout (RM)</th></tr></thead>
    <tbody>${prows}</tbody>
    <tfoot><tr class="tbl-total"><td>Overall (simple sum)</td><td>${rm(totalTgt)}</td><td>${rm(totalAct)}</td><td>${fp(overallAch)}</td><td>${rm(cap)}</td></tr></tfoot></table>
    ${gateHtml}${ah}
    <div class="sec-label">Rollback reconciliation</div>
    <div class="rb-box">
      <div class="rb-row"><span>${qal} incentive paid</span><span>${rm(qa.earned)}</span></div>
      <div class="rb-row"><span>${qbl} incentive paid</span><span>${rm(qb.earned)}</span></div>
      <div class="rb-row"><span>Total paid to date</span><span>${rm(paid)}</span></div>
      <div class="rb-row"><span>${hl} entitlement (payout capped 100%×2)</span><span>${rm(cap)}</span></div>
      <div class="rb-row rb-total"><span>Rollback payable now</span><span style="color:${rb>0?'var(--color-text-success)':'var(--color-text-primary)'};">${rm(rb)}</span></div>
      <div class="rb-row rb-total"><span>Net total for ${hl}</span><span>${rm(net)}</span></div>
    </div>`;
}

function renderYear(){
  if(!CS.q1||!CS.q2||!CS.q3||!CS.q4)return;
  const totalTgt=CS.q1.totalTgt+CS.q2.totalTgt+CS.q3.totalTgt+CS.q4.totalTgt;
  const totalAct=CS.q1.totalAct+CS.q2.totalAct+CS.q3.totalAct+CS.q4.totalAct;
  const overallAch=totalTgt>0?totalAct/totalTgt:0;
  const gate1=overallAch>=THR;
  let ytot=0,prows='';
  GROUPS.forEach((g,i)=>{
    const tgt=CS.q1.details[i].tgt+CS.q2.details[i].tgt+CS.q3.details[i].tgt+CS.q4.details[i].tgt;
    const act=CS.q1.details[i].act+CS.q2.details[i].act+CS.q3.details[i].act+CS.q4.details[i].act;
    const ach=tgt>0?act/tgt:0;
    const pm=MAX*4*g.weight;
    const pp=gate1?payPct(ach,true):0; // uncapped for yearly
    const pe=pp*pm;ytot+=pe;
    const bw=Math.min(ach*100,100).toFixed(1);
    const ac=ach>=0.9?'var(--color-text-success)':'var(--color-text-warning)';
    const bc=ach>=0.9?'var(--color-background-success)':'var(--color-background-warning)';
    const pc=pp>0?'var(--color-text-primary)':'var(--color-text-danger)';
    const ps=!gate1?'Overall <90% — locked':pp>0?fp(ach)+' hit → '+fp(pp)+' (uncapped) of '+rm(pm):'Product <90% — no payout';
    const nn=g.subs?` <span style="font-size:10px;font-style:italic;">(combined)</span>`:'';
    prows+=`<tr><td><div style="font-weight:500;">${g.name}${nn}<span class="tag ${g.tc}">${g.tag}</span></div><div style="font-size:11px;color:var(--color-text-secondary);">Year base: ${rm(pm)}</div></td><td>${rm(tgt)}</td><td>${rm(act)}</td><td><div class="ach-val" style="color:${ac};">${fp(ach)}</div><div class="bar-wrap"><div class="bar-fill" style="width:${bw}%;background:${bc};"></div></div></td><td><div class="pay-val" style="color:${pc};">${gate1&&pp>0?rm(pe):'RM 0.00'}</div><div class="pay-sub">${ps}</div></td></tr>`;
  });
  const paid=CS.q1.earned+CS.q2.earned+CS.q3.earned+CS.q4.earned;
  const rb=Math.max(0,ytot-paid);const net=paid+rb;
  const g1color=gate1?'var(--color-text-success)':'var(--color-text-danger)';
  const gateHtml=`<div class="gate-box"><div class="gate-row"><span class="gate-label">Gate 1 — Full year total sales (${rm(totalAct)} / ${rm(totalTgt)})</span><span style="font-weight:500;color:${g1color};">${fp(overallAch)} ${gate1?'✓ Eligible':'✗ Below 90%'}</span></div><div class="gate-row" style="font-size:11px;color:var(--color-text-secondary);margin-top:2px;"><span>Payout is uncapped for full year — overachievement is rewarded beyond 100%</span></div></div>`;
  const ah=!gate1?`<div class="alert a-warn"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Full year total sales ${fp(overallAch)} — below 90%. No rollback payable.</div>`:rb>0?`<div class="alert a-ok"><i class="ti ti-circle-check" aria-hidden="true"></i> Full year eligible! Rollback of ${rm(rb)} payable (payout uncapped).</div>`:`<div class="alert a-ok"><i class="ti ti-circle-check" aria-hidden="true"></i> Full year eligible. No additional rollback needed.</div>`;
  document.getElementById('yr-content').innerHTML=`
    <div class="sec-label">Full year performance <span class="yr-badge">Payout uncapped</span></div>
    <table class="tbl"><colgroup><col style="width:26%"><col style="width:16%"><col style="width:16%"><col style="width:18%"><col style="width:24%"></colgroup>
    <thead><tr><th>Product</th><th>Year target (RM)</th><th>Year actual (RM)</th><th>Achieve %</th><th>Year payout (RM)</th></tr></thead>
    <tbody>${prows}</tbody>
    <tfoot><tr class="tbl-total"><td>Overall (simple sum)</td><td>${rm(totalTgt)}</td><td>${rm(totalAct)}</td><td>${fp(overallAch)}</td><td style="color:var(--color-text-success);">${rm(ytot)}</td></tr></tfoot></table>
    ${gateHtml}${ah}
    <div class="sec-label">Full year reconciliation</div>
    <div class="rb-box">
      <div class="rb-row"><span>Q1 incentive paid</span><span>${rm(CS.q1.earned)}</span></div>
      <div class="rb-row"><span>Q2 incentive paid</span><span>${rm(CS.q2.earned)}</span></div>
      <div class="rb-row"><span>Q3 incentive paid</span><span>${rm(CS.q3.earned)}</span></div>
      <div class="rb-row"><span>Q4 incentive paid</span><span>${rm(CS.q4.earned)}</span></div>
      <div class="rb-row"><span>Total paid to date</span><span>${rm(paid)}</span></div>
      <div class="rb-row"><span>Full year entitlement (no cap)</span><span style="color:var(--color-text-success);">${rm(ytot)}</span></div>
      <div class="rb-row rb-total"><span>Rollback payable now</span><span style="color:${rb>0?'var(--color-text-success)':'var(--color-text-primary)'};">${rm(rb)}</span></div>
      <div class="rb-row rb-total"><span>Net total for full year</span><span>${rm(net)}</span></div>
    </div>`;
}

function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const tabs=['q1','q2','h1','q3','q4','h2','yr'];
  document.querySelectorAll('.tab-btn')[tabs.indexOf(t)].classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='h1'&&CS.q1&&CS.q2)renderHalf('h1',CS.q1,CS.q2);
  if(t==='h2'&&CS.q3&&CS.q4)renderHalf('h2',CS.q3,CS.q4);
  if(t==='yr'&&CS.q1&&CS.q2&&CS.q3&&CS.q4)renderYear();
}
</script>
